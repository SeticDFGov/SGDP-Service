name: Build and push image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted   

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set Image Tag
      run: |
        echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Build da imagem
      run: |
        docker build -f Dockerfile.prod -t ${{ secrets.DOCKERHUB_USERNAME }}/sgpd_service:${{ env.IMAGE_TAG }} .

    - name: Push da imagem
      run: |
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/sgpd_service:${{ env.IMAGE_TAG }}

    - name: Update deployment manifest
      run: |
        git config --global user.email "ci@example.com"
        git config --global user.name "CI Bot"
        
        git clone https://github.com/SeticDFGov/k8s-manifests.git
        cd k8s-manifests

        yq eval ".spec.template.spec.containers[0].image = \"${{ secrets.DOCKERHUB_USERNAME }}/sgpd_service:${{ env.IMAGE_TAG }}\"" \
          -i backend/deployment.yaml

        git add backend/deployment.yaml
        git commit -m "deploy: update sgpd_service to ${{ env.IMAGE_TAG }}"
        git push origin main
